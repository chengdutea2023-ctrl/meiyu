<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>机器真的能学习吗？</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f6f8fc;
        color: #172033;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(760px, calc(100vw - 32px));
        padding: 32px;
        border: 1px solid #d8e0ec;
        border-radius: 8px;
        background: #fff;
        box-shadow: 0 18px 48px rgba(42, 66, 103, 0.1);
      }
      h1 {
        margin: 0 0 12px;
        font-size: 32px;
      }
      p {
        color: #5d6b82;
        line-height: 1.8;
      }
      button {
        margin-top: 16px;
        margin-right: 12px;
        padding: 12px 18px;
        border: 0;
        border-radius: 8px;
        background: #1f6ff2;
        color: #fff;
        font-size: 16px;
        cursor: pointer;
      }
      button.secondary {
        background: #eef4ff;
        color: #1f6ff2;
      }
      pre {
        margin-top: 20px;
        padding: 16px;
        overflow: auto;
        border-radius: 8px;
        background: #101827;
        color: #dce7ff;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>机器真的能学习吗？</h1>
      <p>这是课程运行区示例课件。学生从学生后台进入时，URL 会带上 launchToken，课件使用它向底座确认学生、班级和任务。</p>
      <button id="complete">完成课程并上报成绩</button>
      <button id="back" class="secondary">返回学生后台</button>
      <pre id="output">正在读取启动凭证...</pre>
    </main>
    <script>
      const searchParams = new URLSearchParams(location.search);
      const apiBase = searchParams.get('platformApiBase') || (location.hostname === 'localhost'
        ? 'http://localhost:3000/api/v1'
        : 'http://data.docpine.online/api/v1');
      const returnUrl = searchParams.get('returnUrl') || (location.hostname === 'localhost'
        ? 'http://localhost:5173/?portal=student'
        : 'http://student.docpine.online');
      const launchToken = searchParams.get('launchToken');
      const output = document.querySelector('#output');
      const backButton = document.querySelector('#back');

      function print(value) {
        output.textContent = typeof value === 'string'
          ? value
          : JSON.stringify(value, null, 2);
      }

      async function readJson(response) {
        const payload = await response.json().catch(() => ({}));
        if (!response.ok) {
          const message = payload?.message || '请求失败';
          throw new Error(Array.isArray(message) ? message.join('；') : message);
        }
        return payload;
      }

      function showTokenExpired() {
        print('本次课程入口已过期，请返回学生后台，从“我的任务”重新进入课程后再提交成绩。');
        backButton.hidden = false;
      }

      async function verifyLaunch() {
        if (!launchToken) {
          print('缺少 launchToken，请从学生后台的课程任务进入。');
          backButton.hidden = false;
          return;
        }

        try {
          const response = await fetch(`${apiBase}/course-runtime/launch/verify`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ launchToken }),
          });
          print(await readJson(response));
        } catch (error) {
          if (error.message.includes('Launch token')) {
            showTokenExpired();
            return;
          }
          print(`启动凭证校验失败：${error.message}`);
        }
      }

      async function completeCourse() {
        if (!launchToken) {
          print('缺少 launchToken，不能上报成绩。');
          backButton.hidden = false;
          return;
        }

        try {
          const response = await fetch(`${apiBase}/course-runtime/launch/records`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              launchToken,
              status: 'COMPLETED',
              score: 92,
              durationSeconds: 480,
              summary: {
                comment: '示例课件完成',
                artifactUrl: `${location.origin}${location.pathname}`,
              },
            }),
          });
          print(await readJson(response));
        } catch (error) {
          if (error.message.includes('Launch token')) {
            showTokenExpired();
            return;
          }
          print(`成绩上报失败：${error.message}`);
        }
      }

      document.querySelector('#complete').addEventListener('click', completeCourse);
      backButton.addEventListener('click', () => {
        window.location.href = returnUrl;
      });
      void verifyLaunch();
    </script>
  </body>
</html>
