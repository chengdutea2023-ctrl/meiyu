<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>机器真的能学习吗？</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f6f8fc;
        color: #172033;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(760px, calc(100vw - 32px));
        padding: 32px;
        border: 1px solid #d8e0ec;
        border-radius: 8px;
        background: #fff;
        box-shadow: 0 18px 48px rgba(42, 66, 103, 0.1);
      }
      h1 {
        margin: 0 0 12px;
        font-size: 32px;
      }
      p {
        color: #5d6b82;
        line-height: 1.8;
      }
      button {
        margin-top: 16px;
        padding: 12px 18px;
        border: 0;
        border-radius: 8px;
        background: #1f6ff2;
        color: #fff;
        font-size: 16px;
        cursor: pointer;
      }
      pre {
        margin-top: 20px;
        padding: 16px;
        overflow: auto;
        border-radius: 8px;
        background: #101827;
        color: #dce7ff;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>机器真的能学习吗？</h1>
      <p>这是课程运行区示例课件。学生从学生后台进入时，URL 会带上 launchToken，课件使用它向底座确认学生、班级和任务。</p>
      <button id="complete">完成课程并上报成绩</button>
      <pre id="output">正在读取启动凭证...</pre>
    </main>
    <script>
      const apiBase = location.hostname === 'localhost'
        ? 'http://localhost:3000/api/v1'
        : 'http://data.docpine.online/api/v1';
      const launchToken = new URLSearchParams(location.search).get('launchToken');
      const output = document.querySelector('#output');

      function print(value) {
        output.textContent = typeof value === 'string'
          ? value
          : JSON.stringify(value, null, 2);
      }

      async function verifyLaunch() {
        if (!launchToken) {
          print('缺少 launchToken，请从学生后台的课程任务进入。');
          return;
        }

        const response = await fetch(`${apiBase}/course-runtime/launch/verify`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ launchToken }),
        });
        print(await response.json());
      }

      async function completeCourse() {
        if (!launchToken) {
          print('缺少 launchToken，不能上报成绩。');
          return;
        }

        const response = await fetch(`${apiBase}/course-runtime/launch/records`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            launchToken,
            status: 'COMPLETED',
            score: 92,
            durationSeconds: 480,
            summary: {
              comment: '示例课件完成',
              artifactUrl: `${location.origin}${location.pathname}`,
            },
          }),
        });
        print(await response.json());
      }

      document.querySelector('#complete').addEventListener('click', completeCourse);
      void verifyLaunch();
    </script>
  </body>
</html>
