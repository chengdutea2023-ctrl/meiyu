    <rect x="287" y="305" width="128" height="70" rx="15" fill="#F7FAFF" stroke="#E2ECFA"/><text class="itemTitle" x="351" y="336" text-anchor="middle">班级管理</text><text class="itemSub" x="351" y="360" text-anchor="middle">组织关系</text>
    <rect x="439" y="305" width="128" height="70" rx="15" fill="#F7FAFF" stroke="#E2ECFA"/><text class="itemTitle" x="503" y="336" text-anchor="middle">用户管理</text><text class="itemSub" x="503" y="360" text-anchor="middle">教师学生</text>
    <rect x="135" y="389" width="128" height="70" rx="15" fill="#F7FAFF" stroke="#E2ECFA"/><text class="itemTitle" x="199" y="420" text-anchor="middle">课程管理</text><text class="itemSub" x="199" y="444" text-anchor="middle">登记与目录</text>
    <rect x="287" y="389" width="128" height="70" rx="15" fill="#F7FAFF" stroke="#E2ECFA"/><text class="itemTitle" x="351" y="420" text-anchor="middle">审核管理</text><text class="itemSub" x="351" y="444" text-anchor="middle">教师与课程</text>
    <rect x="439" y="389" width="128" height="70" rx="15" fill="#F7FAFF" stroke="#E2ECFA"/><text class="itemTitle" x="503" y="420" text-anchor="middle">发布管理</text><text class="itemSub" x="503" y="444" text-anchor="middle">上线与下线</text>
  </g>

  <rect x="1225" y="165" width="470" height="300" rx="26" fill="#FFFFFF" stroke="#D7F1E5" filter="url(#shadow)"/>
  <circle cx="1298" cy="234" r="48" fill="url(#green)"/>
  <text x="1298" y="252" text-anchor="middle" font-size="38" fill="#FFFFFF" font-family="Arial">●</text>
  <text class="panelTitle" x="1370" y="223">教师</text>
  <text class="panelSub" x="1370" y="258">教学组织、学情分析与反馈</text>
  <rect x="1262" y="302" width="375" height="54" rx="15" fill="#F8FFFB" stroke="#DDF4E8"/><text class="itemTitle" x="1295" y="335">查看班级</text><text class="itemSub" x="1398" y="335">管理班级与学生名单</text>
  <rect x="1262" y="365" width="375" height="54" rx="15" fill="#F8FFFB" stroke="#DDF4E8"/><text class="itemTitle" x="1295" y="398">布置课程/作业</text><text class="itemSub" x="1430" y="398">分配学习内容与任务</text>
  <rect x="1262" y="428" width="375" height="54" rx="15" fill="#F8FFFB" stroke="#DDF4E8"/><text class="itemTitle" x="1295" y="461">查看学习记录</text><text class="itemSub" x="1430" y="461">了解得分、耗时、完成情况</text>

  <rect x="105" y="505" width="470" height="300" rx="26" fill="#FFFFFF" stroke="#F4DFB5" filter="url(#shadow)"/>
  <circle cx="178" cy="574" r="48" fill="url(#yellow)"/>
  <text x="178" y="592" text-anchor="middle" font-size="38" fill="#FFFFFF" font-family="Arial">●</text>
