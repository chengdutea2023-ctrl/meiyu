  <text class="panelSub" x="250" y="598">学习、互动、作品与成长</text>
  <rect x="135" y="642" width="430" height="51" rx="15" fill="#FFFDF7" stroke="#F1E1B8"/><text class="itemTitle" x="170" y="674">注册/登录</text><text class="itemSub" x="292" y="674">创建账号，进入学生后台</text>
