  <circle cx="178" cy="234" r="48" fill="url(#blue)"/>
  <text x="178" y="252" text-anchor="middle" font-size="42" fill="#FFFFFF" font-family="Arial">♔</text>
  <text class="panelTitle" x="250" y="223">管理员</text>
  <text class="panelSub" x="250" y="258">平台运营、审核与发布</text>
  <g>
