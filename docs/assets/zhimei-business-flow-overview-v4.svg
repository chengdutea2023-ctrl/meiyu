<svg width="1800" height="1360" viewBox="0 0 1800 1360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1800" y2="1360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7FBFF"/>
      <stop offset="0.5" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F6FBF8"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#2F7BFF"/><stop offset="1" stop-color="#5EA8FF"/></linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#20C879"/><stop offset="1" stop-color="#72E4A7"/></linearGradient>
    <linearGradient id="yellow" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#FFB321"/><stop offset="1" stop-color="#FFD45D"/></linearGradient>
    <linearGradient id="coral" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#FF675F"/><stop offset="1" stop-color="#FF947B"/></linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#7A66FF"/><stop offset="1" stop-color="#A88CFF"/></linearGradient>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="23" flood-color="#234A7D" flood-opacity="0.10"/>
    </filter>
    <filter id="soft" x="-15%" y="-15%" width="130%" height="130%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="13" flood-color="#23395D" flood-opacity="0.08"/>
    </filter>
    <style>
      .title{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans CJK SC","Microsoft YaHei",sans-serif;font-size:62px;font-weight:850;fill:#111D35;letter-spacing:2px}
      .subtitle{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans CJK SC","Microsoft YaHei",sans-serif;font-size:23px;font-weight:600;fill:#64718A;letter-spacing:7px}
      .panelTitle{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans CJK SC","Microsoft YaHei",sans-serif;font-size:30px;font-weight:820;fill:#172238}
      .panelSub{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans CJK SC","Microsoft YaHei",sans-serif;font-size:17px;font-weight:520;fill:#66758C}
      .itemTitle{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans CJK SC","Microsoft YaHei",sans-serif;font-size:18px;font-weight:780;fill:#202B42}
      .itemSub{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans CJK SC","Microsoft YaHei",sans-serif;font-size:13px;font-weight:520;fill:#758198}
      .hub{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans CJK SC","Microsoft YaHei",sans-serif;font-size:46px;font-weight:850;fill:#15213A}
      .hubSub{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans CJK SC","Microsoft YaHei",sans-serif;font-size:18px;font-weight:600;fill:#64718A}
      .badgeText{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans CJK SC","Microsoft YaHei",sans-serif;font-size:18px;font-weight:780;fill:#172238}
      .laneRole{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans CJK SC","Microsoft YaHei",sans-serif;font-size:24px;font-weight:850;fill:white}
      .stage{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans CJK SC","Microsoft YaHei",sans-serif;font-size:19px;font-weight:820;fill:#25314A}
      .stepTitle{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans CJK SC","Microsoft YaHei",sans-serif;font-size:21px;font-weight:820;fill:#182238}
      .stepSub{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans CJK SC","Microsoft YaHei",sans-serif;font-size:14px;font-weight:540;fill:#69768D}
      .note{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans CJK SC","Microsoft YaHei",sans-serif;font-size:17px;font-weight:600;fill:#65728A}
    </style>
  </defs>

  <rect width="1800" height="1360" fill="url(#bg)"/>
  <circle cx="425" cy="62" r="7" fill="#2F7BFF"/>
  <circle cx="453" cy="62" r="7" fill="#FFBE38"/>
  <circle cx="481" cy="62" r="7" fill="#5BD98E"/>
  <circle cx="1319" cy="62" r="7" fill="#2F7BFF"/>
  <circle cx="1347" cy="62" r="7" fill="#FF896F"/>
  <circle cx="1375" cy="62" r="7" fill="#5BD98E"/>
