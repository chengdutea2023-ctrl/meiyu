  <rect x="135" y="760" width="430" height="51" rx="15" fill="#FFFDF7" stroke="#F1E1B8"/><text class="itemTitle" x="170" y="792">完成任务</text><text class="itemSub" x="292" y="792">提交练习、作品或测评</text>

  <rect x="1225" y="505" width="470" height="300" rx="26" fill="#FFFFFF" stroke="#F8D8D3" filter="url(#shadow)"/>
  <circle cx="1298" cy="574" r="48" fill="url(#coral)"/>
  <text x="1298" y="590" text-anchor="middle" font-size="33" fill="#FFFFFF" font-family="Arial">&lt;/&gt;</text>
  <text class="panelTitle" x="1370" y="563">课件开发者</text>
  <text class="panelSub" x="1370" y="598">课程内容、互动体验与结果回传</text>
  <rect x="1262" y="638" width="375" height="48" rx="14" fill="#FFF9F8" stroke="#F6DDD9"/><text class="itemTitle" x="1295" y="668">开发优质课件</text><text class="itemSub" x="1438" y="668">制作课程与学习资源</text>
  <rect x="1262" y="695" width="375" height="48" rx="14" fill="#FFF9F8" stroke="#F6DDD9"/><text class="itemTitle" x="1295" y="725">遵循教学标准</text><text class="itemSub" x="1438" y="725">符合底座与课程要求</text>
  <rect x="1262" y="752" width="375" height="48" rx="14" fill="#FFF9F8" stroke="#F6DDD9"/><text class="itemTitle" x="1295" y="782">反馈学习效果</text><text class="itemSub" x="1438" y="782">成绩、作品、学习摘要</text>

  <!-- Hub -->
  <circle cx="900" cy="428" r="168" fill="#F4F8FF"/>
  <circle cx="900" cy="428" r="206" stroke="#CFE1FF" stroke-width="2" stroke-dasharray="9 9"/>
  <rect x="748" y="292" width="304" height="264" rx="36" fill="#FFFFFF" stroke="#E5EDF9" filter="url(#shadow)"/>
  <text x="900" y="370" text-anchor="middle" font-size="60" fill="#2F7BFF" font-family="Arial">✦</text>
  <text class="hub" x="900" y="440" text-anchor="middle">业务底座</text>
  <text class="hubSub" x="900" y="486" text-anchor="middle">统一管理 · 数据汇聚 · 价值驱动</text>

  <path d="M575 322 C650 322 650 365 748 365" stroke="#2F7BFF" stroke-width="3"/><circle cx="575" cy="322" r="10" fill="#2F7BFF"/>
  <path d="M1225 322 C1140 322 1140 365 1052 365" stroke="#20C879" stroke-width="3"/><circle cx="1225" cy="322" r="10" fill="#20C879"/>
  <path d="M575 665 C650 665 650 492 748 492" stroke="#FFB321" stroke-width="3"/><circle cx="575" cy="665" r="10" fill="#FFB321"/>
  <path d="M1225 665 C1140 665 1140 492 1052 492" stroke="#FF675F" stroke-width="3"/><circle cx="1225" cy="665" r="10" fill="#FF675F"/>

  <rect x="651" y="610" width="698" height="92" rx="28" fill="#FFFFFF" stroke="#E5EDF9" filter="url(#soft)"/>
  <g>
    <circle cx="728" cy="656" r="24" fill="url(#blue)"/><text class="badgeText" x="728" y="694" text-anchor="middle">数据中心</text>
    <circle cx="886" cy="656" r="24" fill="url(#green)"/><text class="badgeText" x="886" y="694" text-anchor="middle">权限管理</text>
    <circle cx="1044" cy="656" r="24" fill="url(#yellow)"/><text class="badgeText" x="1044" y="694" text-anchor="middle">过程记录</text>
    <circle cx="1202" cy="656" r="24" fill="url(#coral)"/><text class="badgeText" x="1202" y="694" text-anchor="middle">质量评估</text>
  </g>

  <!-- Swim lanes -->
  <rect x="70" y="850" width="1660" height="455" rx="32" fill="#FFFFFF" stroke="#D8E5F7" filter="url(#shadow)"/>
  <rect x="105" y="877" width="405" height="46" rx="23" fill="url(#blue)"/>
  <text class="stage" x="132" y="907" fill="#FFFFFF">课程学习闭环（四角色 × 五阶段）</text>

  <g transform="translate(112 943)">
    <text class="stage" x="348" y="0" text-anchor="middle">准备配置</text>
    <text class="stage" x="623" y="0" text-anchor="middle">课程组织</text>
    <text class="stage" x="898" y="0" text-anchor="middle">学习互动</text>
