    <rect x="225" y="0" width="245" height="72" rx="17" fill="#F7FAFF" stroke="#D5E6FF"/><text class="stepTitle" x="250" y="31">建学校/班级</text><text class="stepSub" x="250" y="56">配置组织、学生和教师归属</text>
    <rect x="500" y="0" width="245" height="72" rx="17" fill="#F7FAFF" stroke="#D5E6FF"/><text class="stepTitle" x="525" y="31">审核与发布</text><text class="stepSub" x="525" y="56">审核教师，发布可用课程</text>
    <rect x="775" y="0" width="245" height="72" rx="17" fill="#F7FAFF" stroke="#D5E6FF"/><text class="stepTitle" x="800" y="31">保障入口</text><text class="stepSub" x="800" y="56">维护课程入口和运行状态</text>
    <rect x="1050" y="0" width="245" height="72" rx="17" fill="#F7FAFF" stroke="#D5E6FF"/><text class="stepTitle" x="1075" y="31">汇总数据</text><text class="stepSub" x="1075" y="56">查看整体学习和使用情况</text>
    <rect x="1325" y="0" width="245" height="72" rx="17" fill="#F7FAFF" stroke="#D5E6FF"/><text class="stepTitle" x="1350" y="31">优化运营</text><text class="stepSub" x="1350" y="56">调整课程、班级和资源策略</text>
  </g>

  <g transform="translate(105 1055)">
    <rect x="0" y="0" width="190" height="72" rx="18" fill="url(#green)"/><text class="laneRole" x="95" y="45" text-anchor="middle">教师</text>
    <rect x="225" y="0" width="245" height="72" rx="17" fill="#F8FFFB" stroke="#CCF0DE"/><text class="stepTitle" x="250" y="31">查看班级</text><text class="stepSub" x="250" y="56">了解学生名单与归属</text>
    <rect x="500" y="0" width="245" height="72" rx="17" fill="#F8FFFB" stroke="#CCF0DE"/><text class="stepTitle" x="525" y="31">布置任务</text><text class="stepSub" x="525" y="56">选择课程，分配到班级</text>
    <rect x="775" y="0" width="245" height="72" rx="17" fill="#F8FFFB" stroke="#CCF0DE"/><text class="stepTitle" x="800" y="31">跟进过程</text><text class="stepSub" x="800" y="56">关注学生是否进入和完成</text>
    <rect x="1050" y="0" width="245" height="72" rx="17" fill="#F8FFFB" stroke="#CCF0DE"/><text class="stepTitle" x="1075" y="31">查看学情</text><text class="stepSub" x="1075" y="56">看成绩、耗时、作品入口</text>
    <rect x="1325" y="0" width="245" height="72" rx="17" fill="#F8FFFB" stroke="#CCF0DE"/><text class="stepTitle" x="1350" y="31">教学反馈</text><text class="stepSub" x="1350" y="56">讲解、辅导、调整任务</text>
  </g>

  <g transform="translate(105 1140)">
    <rect x="0" y="0" width="190" height="72" rx="18" fill="url(#yellow)"/><text class="laneRole" x="95" y="45" text-anchor="middle">学生</text>
    <rect x="225" y="0" width="245" height="72" rx="17" fill="#FFFDF7" stroke="#F3E2B6"/><text class="stepTitle" x="250" y="31">注册/登录</text><text class="stepSub" x="250" y="56">进入自己的学生后台</text>
    <rect x="500" y="0" width="245" height="72" rx="17" fill="#FFFDF7" stroke="#F3E2B6"/><text class="stepTitle" x="525" y="31">查看任务</text><text class="stepSub" x="525" y="56">看到班级分配的课程</text>
    <rect x="775" y="0" width="245" height="72" rx="17" fill="#FFFDF7" stroke="#F3E2B6"/><text class="stepTitle" x="800" y="31">进入课件</text><text class="stepSub" x="800" y="56">完成互动、练习或作品</text>
    <rect x="1050" y="0" width="245" height="72" rx="17" fill="#FFFDF7" stroke="#F3E2B6"/><text class="stepTitle" x="1075" y="31">获得结果</text><text class="stepSub" x="1075" y="56">分数、进度和作品被记录</text>
    <rect x="1325" y="0" width="245" height="72" rx="17" fill="#FFFDF7" stroke="#F3E2B6"/><text class="stepTitle" x="1350" y="31">持续学习</text><text class="stepSub" x="1350" y="56">根据反馈继续成长</text>
  </g>

  <g transform="translate(105 1225)">
    <rect x="0" y="0" width="190" height="72" rx="18" fill="url(#coral)"/><text class="laneRole" x="95" y="45" text-anchor="middle">课件开发者</text>
    <rect x="225" y="0" width="245" height="72" rx="17" fill="#FFF9F8" stroke="#F5D6D0"/><text class="stepTitle" x="250" y="31">理解规范</text><text class="stepSub" x="250" y="56">围绕底座身份和任务开发</text>
    <rect x="500" y="0" width="245" height="72" rx="17" fill="#FFF9F8" stroke="#F5D6D0"/><text class="stepTitle" x="525" y="31">交付课件</text><text class="stepSub" x="525" y="56">上传静态课件或服务课件</text>
    <rect x="775" y="0" width="245" height="72" rx="17" fill="#FFF9F8" stroke="#F5D6D0"/><text class="stepTitle" x="800" y="31">支持互动</text><text class="stepSub" x="800" y="56">练习、智能体、绘画、投屏</text>
    <rect x="1050" y="0" width="245" height="72" rx="17" fill="#FFF9F8" stroke="#F5D6D0"/><text class="stepTitle" x="1075" y="31">回传摘要</text><text class="stepSub" x="1075" y="56">成绩、耗时、作品和状态</text>
    <rect x="1325" y="0" width="245" height="72" rx="17" fill="#FFF9F8" stroke="#F5D6D0"/><text class="stepTitle" x="1350" y="31">迭代内容</text><text class="stepSub" x="1350" y="56">根据数据优化课程体验</text>
  </g>

  <path d="M1660 1260 C1718 1260 1718 1006 1660 1006" stroke="#2F7BFF" stroke-width="3" stroke-dasharray="8 8" stroke-linecap="round"/>
  <text class="note" x="900" y="1322" text-anchor="middle">学习结果回流到底座，驱动课程、教学、运营和课件内容持续优化</text>
