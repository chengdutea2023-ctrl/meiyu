services:
  postgres:
    image: postgres:16-alpine
    container_name: jiaoxue-postgres
    environment:
      POSTGRES_USER: jiaoxue
      POSTGRES_PASSWORD: jiaoxue_password
      POSTGRES_DB: jiaoxue_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: jiaoxue-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:

